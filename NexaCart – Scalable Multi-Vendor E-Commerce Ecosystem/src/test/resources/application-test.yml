spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  cache:
    type: simple
  data:
    redis:
      repositories:
        enabled: false

app:
  jwt:
    # 256-bit secret key in base64/hex for HMAC-SHA256 signing
    secret: dGhpcy1pcy1hLXZlcnktc2VjdXJlLWFuZC1sb25nLWVub3VnaC1zZWNyZXQta2V5LWZvci1uZXhhY2FydC1qd3Qtc2lnbmluZw==
    # 1 minute (60,000 ms)
    expiration-ms: 60000
    # 10 minutes (600,000 ms)
    refresh-expiration-ms: 600000
    refresh-cookie-name: nexacart-refresh-test
