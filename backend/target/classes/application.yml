server:
  port: 8080

spring:
  application:
    name: antigravity-backend
  
  datasource:
    url: jdbc:postgresql://localhost:5432/antigravity
    username: postgres
    password: postgrespassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: 407f3f982928374d6f7a6b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e
  expiration: 86400000 # 24 hours
