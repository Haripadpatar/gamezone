version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: agx-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: antigravity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: agx-redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: agx-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/antigravity
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgrespassword
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: 407f3f982928374d6f7a6b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e
      JWT_EXPIRATION: 86400000
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
